name: Build AltSnap (14900K Optimized)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-perf:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSYS2 (UCRT64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          make
          mingw-w64-ucrt-x86_64-gcc
          git

    - name: Prepare Files and Fix Encodings
      shell: bash
      run: |
        # 1. 彻底覆盖并屏蔽 Git 的底层编码转换机制
        # 强制 Git 忽略项目 .gitattributes 中的 utf-16le-bom 灾难性规则
        echo "* -working-tree-encoding" > .git/info/attributes
        
        # 2. 刷新索引并强制重置工作区
        # 这会将所有的 .rc 和 .c 源码文件还原为原生的 UTF-8 字节状态
        # 完美解决 GNU windres 无法解析 UTF-16 导致 Syntax Error 的致命问题
        git rm --cached -r . >/dev/null 2>&1
        git reset --hard HEAD >/dev/null 2>&1
        
        # 3. 手动转换语言和配置文件
        # 程序在 Windows 运行时依然需要配置文件带有 BOM 头，因此定向精准转换
        for f in Lang/*.ini *.dni; do
          if [ -f "$f" ]; then
            printf '\xFF\xFE' > "${f}.utf16"
            iconv -f UTF-8 -t UTF-16LE "$f" >> "${f}.utf16" 2>/dev/null || true
            mv "${f}.utf16" "$f"
          fi
        done

    - name: Build AltSnap (14900K Release)
      shell: msys2 {0}
      run: |
        make -fMakefileX64 CFLAGS="-O3 -march=alderlake -mtune=alderlake -flto -DNDEBUG" LDFLAGS="-s -flto -mwindows"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
