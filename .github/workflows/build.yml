name: Build AltSnap (14900K Optimized)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-perf:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSYS2 (UCRT64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        # 此处新增了 git，确保隔离环境内可以正常调用 Git 指令
        install: >-
          make
          mingw-w64-ucrt-x86_64-gcc
          git

    - name: Build AltSnap (14900K Release)
      shell: msys2 {0}
      run: |
        # 1. 修复 Git 底层 Bug，防止 make 崩溃
        sed -i 's/utf-16le-bom/UTF-16LE/gI' .gitattributes
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git commit -am "Bypass UTF-16LE-BOM gitattributes bug" || true
        
        # 2. 手动完成语言文件转码
        for f in Lang/*.ini AltSnap.dni; do
          if [ -f "$f" ]; then
            printf '\xFF\xFE' > "${f}.utf16"
            iconv -f UTF-8 -t UTF-16LE "$f" >> "${f}.utf16" 2>/dev/null || true
            mv "${f}.utf16" "$f"
          fi
        done
        
        # 3. 执行极限性能编译
        make -fMakefileX64 CFLAGS="-O3 -march=alderlake -mtune=alderlake -flto -DNDEBUG" LDFLAGS="-s -flto -mwindows"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
