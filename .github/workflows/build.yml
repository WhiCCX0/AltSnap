name: Build AltSnap (14900K Ultimate MSVC)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-msvc:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC Toolchain
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build with MSVC (14900K Optimized)
      shell: cmd
      run: |
        :: 【新增】/MP 开启多核并行编译，榨干 GitHub 容器 CPU，显著缩短编译等待时间
        :: 宏定义：精简系统调用、强制 Win10/11 API
        :: 性能极限：最高速度 /O2、LTO前期 /GL、全数据隔离 /Gw、14900K特化 /arch:AVX2 /favor:INTEL64、去安全检查 /GS-、静态链接 /MT
        set CL=/MP /O2 /GL /Gw /arch:AVX2 /favor:INTEL64 /GS- /MT /D WIN32_LEAN_AND_MEAN /D NOMINMAX /D _WIN32_WINNT=0x0A00 %CL%
        
        :: 链接器：LTO最终合成 /LTCG、死代码消除 /OPT:REF、高强度相同函数折叠 /OPT:ICF=10
        set LINK=/LTCG /OPT:REF /OPT:ICF=10 %LINK%
        
        :: 执行编译脚本
        call mkmsvc.bat

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
