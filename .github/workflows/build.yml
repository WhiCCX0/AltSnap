name: Build AltSnap (14900K Clang)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-perf:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSYS2 (CLANG64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        # 抛弃 gcc，直接安装 clang 和 lld 现代编译链
        install: >-
          make
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-lld
          git

    - name: Prepare Files and Fix Encodings
      shell: bash
      run: |
        # 物理隔绝 Git 的错误转换
        echo "* -working-tree-encoding" > .git/info/attributes
        git rm --cached -r . >/dev/null 2>&1
        git reset --hard HEAD >/dev/null 2>&1
        
        # 仅对运行时所需的 INI 文件转码
        for f in Lang/*.ini *.dni; do
          if [ -f "$f" ]; then
            printf '\xFF\xFE' > "${f}.utf16"
            iconv -f UTF-8 -t UTF-16LE "$f" >> "${f}.utf16" 2>/dev/null || true
            mv "${f}.utf16" "$f"
          fi
        done

    - name: Build AltSnap (14900K Release)
      shell: msys2 {0}
      run: |
        # 强制接管 CC 和 WR 参数，使用 clang 和 llvm-windres 编译
        make -fMakefileX64 CC=clang CXX=clang++ WR=llvm-windres CFLAGS="-O3 -march=alderlake -flto=thin -DNDEBUG" LDFLAGS="-s -flto=thin -fuse-ld=lld -mwindows"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
