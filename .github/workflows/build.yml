name: Build AltSnap (14900K Native MSVC)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-msvc:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC Toolchain
      # 直接调用 GitHub 官方预装的 Visual Studio 2022 编译环境 (完美替代 MSYS2)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build with MSVC (14900K Optimized)
      shell: cmd
      run: |
        :: 1. 通过系统环境变量，暴力注入微软官方的极客优化指令
        :: /O2 = 最大化执行速度
        :: /GL = 全程序跨文件深度优化 (LTO的微软等效版)
        :: /arch:AVX2 = 直接调用 14900K 支持的 AVX2 高级矢量扩展指令集，性能飙升
        :: /favor:INTEL64 = 专门针对 Intel 处理器微架构优化内存调度
        set CL=/O2 /GL /arch:AVX2 /favor:INTEL64 %CL%
        set LINK=/LTCG /OPT:REF /OPT:ICF %LINK%
        
        :: 2. 直接运行原作者提供的原生 MSVC 编译脚本
        :: 彻底告别 makefile 和 windres 的乱码崩溃噩梦
        call mkmsvc.bat

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-MSVC-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
          x64/
          Release/
