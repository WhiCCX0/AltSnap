name: Build AltSnap (14900K Ultimate MSVC)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-msvc:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC Toolchain
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build with MSVC (Corrected Ultimate)
      shell: cmd
      run: |
        cd /d %GITHUB_WORKSPACE%

        :: 剔除了导致编译失败的 /MT 和三个 /D 宏定义
        :: 保留最高效的 CPU 压榨参数：最高速度、LTO 预备、全局数据隔离、AVX2 特化、去除安全检查、强制同步 PDB
        set CL=/O2 /GL /Gw /arch:AVX2 /favor:INTEL64 /GS- /FS %CL%

        :: 保留大师推荐的激进链接期合并参数
        set LINK=/LTCG /OPT:REF /OPT:ICF=10 %LINK%

        call mkmsvc.bat

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Master-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
