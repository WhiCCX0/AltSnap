name: Build AltSnap (14900K Ultimate MSVC)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-msvc:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC Toolchain
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build with MSVC (Master Optimization)
      shell: cmd
      run: |
        :: 1. 防御性跳转，确保处于正确的源码根目录
        cd /d %GITHUB_WORKSPACE%

        :: 2. 注入大师优化方案的编译参数
        :: 使用 ^ 符号进行优雅的换行
        :: /FS 强制同步写入 PDB，防止并发写入导致文件锁定报错
        set CL=/O2 /GL /Gw /arch:AVX2 /favor:INTEL64 /GS- /MT /FS ^
        /D WIN32_LEAN_AND_MEAN /D NOMINMAX /D _WIN32_WINNT=0x0A00 %CL%

        :: 3. 注入链接参数
        set LINK=/LTCG /OPT:REF /OPT:ICF=10 %LINK%

        :: 4. 调用原生编译批处理
        call mkmsvc.bat

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Master-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
