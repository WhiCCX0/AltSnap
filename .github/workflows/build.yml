name: Build AltSnap (14900K Optimized)

on: 
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extreme-perf:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSYS2 (UCRT64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          make
          mingw-w64-ucrt-x86_64-gcc
          git

    - name: Prepare Files and Fix Encodings
      shell: bash
      run: |
        # 1. 彻底覆盖并屏蔽 Git 的底层编码转换机制
        echo "* -working-tree-encoding" > .git/info/attributes
        git rm --cached -r . >/dev/null 2>&1
        git reset --hard HEAD >/dev/null 2>&1
        
        # 2. 手动转换语言和配置文件
        for f in Lang/*.ini *.dni; do
          if [ -f "$f" ]; then
            printf '\xFF\xFE' > "${f}.utf16"
            iconv -f UTF-8 -t UTF-16LE "$f" >> "${f}.utf16" 2>/dev/null || true
            mv "${f}.utf16" "$f"
          fi
        done

    - name: Build AltSnap (14900K Release)
      shell: msys2 {0}
      run: |
        # 增加 WR="windres --use-temp-file" 参数，完美绕过 MSYS2 环境下管道崩溃的 Bug
        make -fMakefileX64 WR="windres --use-temp-file" CFLAGS="-O3 -march=alderlake -mtune=alderlake -flto -DNDEBUG" LDFLAGS="-s -flto -mwindows"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltSnap-14900K-Release
        path: |
          *.exe
          *.dll
          *.ini
          Lang/
